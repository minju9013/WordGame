<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>한글 단어 맞추기</title>

  <!-- 귀여운 한글 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />

  <!-- 스타일시트 -->
  <link rel="stylesheet" href="styles.css" />

  <!-- canvas confetti 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- Twemoji: 이모지를 SVG 이미지로 렌더링 (기기와 무관하게 동일/안 깨짐) -->
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>

  <!-- 게임 데이터 & 로직 (defer: HTML 파싱 후 실행) -->
  <script src="data.js" defer></script>
  <script src="game.js" defer></script>
</head>
<body>
  <header>
    <img class="logo" src="logo.png" alt="한글 놀이" />

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="w1">그림＋글자</button>
      <button class="tab" data-tab="w2">그림만</button>
      <button class="tab" data-tab="w3">글자만</button>
      <button class="tab" data-tab="match">선긋기</button>
      <button class="tab" data-tab="trace">따라쓰기</button>
    </nav>

    <div class="step-select-wrap">
      <div class="dropdown" id="stepDropdown">
        <button type="button" class="dropdown-btn" id="stepDdBtn"
                aria-haspopup="listbox" aria-expanded="false" aria-label="단계 선택">
          <span id="stepDdLabel">Step1</span>
          <span class="dropdown-caret" aria-hidden="true">▾</span>
        </button>
        <ul class="dropdown-menu" id="stepDdMenu" role="listbox" hidden></ul>
      </div>
    </div>
  </header>

  <main>
    <div class="play">
      <div class="question" id="question"></div>
      <div class="cards" id="cards"></div>
    </div>

    <div class="match" id="match" hidden>
      <div class="match-hint" id="matchHint">그림과 글자를 선으로 이어요 ✏️</div>
      <div class="match-board" id="matchBoard">
        <div class="match-col" id="matchLeft"></div>
        <div class="match-col" id="matchRight"></div>
        <svg class="match-svg" id="matchSvg"></svg>
      </div>
    </div>

    <div class="trace" id="trace" hidden>
      <div class="trace-left">
        <div class="trace-emoji" id="traceEmoji"></div>
        <div class="trace-word" id="traceWord"></div>
      </div>
      <div class="trace-right">
        <div class="trace-head">
          <div class="trace-tools">
            <div class="brush-select" id="brushSelect" role="group" aria-label="굵기">
              <button type="button" class="brush-btn" data-brush="0.02" aria-label="가는 굵기"><span class="brush-dot s"></span></button>
              <button type="button" class="brush-btn active" data-brush="0.03" aria-label="보통 굵기"><span class="brush-dot m"></span></button>
              <button type="button" class="brush-btn" data-brush="0.05" aria-label="두꺼운 굵기"><span class="brush-dot l"></span></button>
            </div>
            <div class="tool-select" id="toolSelect" role="group" aria-label="도구 선택">
              <button type="button" class="tool-btn active" data-tool="pen">✏️ 펜</button>
              <button type="button" class="tool-btn" data-tool="eraser">🧽 지우개</button>
            </div>
            <button type="button" class="trace-clear" id="traceClear">전체 지우기</button>
          </div>
        </div>
        <div class="trace-grid" id="traceGrid"></div>
      </div>
    </div>

    <div class="footer">
      <div class="message" id="message"></div>
      <div class="controls">
        <button class="nav-btn" id="prevBtn">◀ 이전</button>
        <button class="nav-btn next-btn" id="nextBtn">다음 ▶</button>
      </div>
    </div>
  </main>
</body>
</html>
